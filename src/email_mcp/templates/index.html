<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email MCP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="app">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="brand-icon material-symbols-rounded" style="font-size:28px">mail</span>
            <div>
                <div class="brand-text">Email MCP</div>
                <div class="subtitle-text">Self-hosted mail</div>
            </div>
        </div>
        <div class="status-badge online" id="status-badge">
            <span class="status-dot material-symbols-rounded">circle</span>
            <span id="status-text">オンライン</span>
        </div>
        <nav class="nav">
            <div class="nav-item active" data-view="inbox" onclick="navigateTo('inbox')">
                <span class="nav-icon material-symbols-rounded">inbox</span>
                <span class="nav-label">すべてのメール</span>
            </div>
            <div class="nav-item" data-view="accounts" onclick="navigateTo('accounts')">
                <span class="nav-icon material-symbols-rounded">account_circle</span>
                <span class="nav-label">アカウント</span>
            </div>
            <div class="nav-item" data-view="domains" onclick="navigateTo('domains')">
                <span class="nav-icon material-symbols-rounded">language</span>
                <span class="nav-label">ドメイン</span>
            </div>
            <div class="nav-item" data-view="search" onclick="navigateTo('search')">
                <span class="nav-icon material-symbols-rounded">search</span>
                <span class="nav-label">検索</span>
            </div>
        </nav>
        <div class="sidebar-footer">
            v0.2.0 · <a href="https://github.com/sashimi3433/email-mcp" target="_blank" style="color:var(--accent);text-decoration:none">GitHub</a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content" id="main-content">
        <!-- Views rendered here by JS -->
    </div>
</div>

<!-- Modal Container -->
<div class="modal" id="modal">
    <div class="modal-overlay" onclick="closeModal()"></div>
    <div class="modal-content" id="modal-content"></div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toast-container"></div>

<script>
// ─── State ────────────────────────────────────
let accounts = [];
let domains = [];
let currentView = 'inbox';

const avatarColors = ['#5b8def','#3fb950','#a371f7','#d29922','#f85149','#1f6feb','#db61a2','#238636'];

// ─── API ──────────────────────────────────────
async function api(method, url, body) {
    const opts = { method, headers: {'Content-Type': 'application/json'} };
    if (body) opts.body = JSON.stringify(body);
    try {
        const res = await fetch(url, opts);
        return await res.json();
    } catch(e) {
        showToast('通信エラー: ' + e.message, 'error');
        throw e;
    }
}

// ─── Toast ────────────────────────────────────
function showToast(msg, type = 'info') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icons = { success: '<span class="material-symbols-rounded" style="font-size:16px">check_circle</span>', error: '<span class="material-symbols-rounded" style="font-size:16px">error</span>', info: '<span class="material-symbols-rounded" style="font-size:16px">info</span>' };
    toast.innerHTML = `<span>${icons[type] || '<span class="material-symbols-rounded" style="font-size:16px">info</span>'}</span><span>${msg}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        toast.style.transition = 'all 0.3s';
        setTimeout(() => toast.remove(), 300);
    }, 4000);
}

// ─── Navigation (History API) ──────────────────
function updateNavActive(view) {
    document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.toggle('active', view ? el.dataset.view === view : false);
    });
}

function navigateTo(view, push = true) {
    currentView = view;
    updateNavActive(view);
    const main = document.getElementById('main-content');
    main.scrollTop = 0;

    if (push) {
        history.pushState({ view }, '', '/' + view);
    }

    if (view === 'inbox') renderInbox();
    else if (view === 'accounts') renderAccounts();
    else if (view === 'domains') renderDomains();
    else if (view === 'search') renderSearch();
}

// Handle browser back/forward
window.addEventListener('popstate', (e) => {
    if (!e.state) {
        navigateTo('inbox', false);
        return;
    }
    if (e.state.view === 'message' && e.state.id) {
        // Re-render message detail without pushing new history
        viewMessage(e.state.id, false);
    } else if (e.state.view) {
        navigateTo(e.state.view, false);
    }
});

// Initialize from URL on load
document.addEventListener('DOMContentLoaded', async () => {
    // Check server status
    try {
        await api('GET', '/api/health');
    } catch {
        document.getElementById('status-badge').className = 'status-badge offline';
        document.getElementById('status-text').textContent = 'オフライン';
    }

    // Load accounts for search dropdown
    try {
        accounts = await api('GET', '/api/accounts');
    } catch {}

    // Navigate to view from URL
    const path = window.location.pathname.replace(/^\//, '');
    const validViews = ['inbox', 'accounts', 'domains', 'search'];
    const initialView = validViews.includes(path) ? path : 'inbox';
    navigateTo(initialView, false);
});

// ─── Helpers ──────────────────────────────────
function avatarColor(str) {
    return avatarColors[Math.abs([...str].reduce((a, c) => a + c.charCodeAt(0), 0)) % avatarColors.length];
}

function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
        const dt = new Date(dateStr);
        const now = new Date();
        if (dt.toDateString() === now.toDateString()) {
            return `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
        }
        return `${dt.getMonth()+1}/${dt.getDate()}`;
    } catch { return dateStr.substring(0, 10); }
}

function escapeHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function initials(str) {
    if (!str) return '?';
    return str[0].toUpperCase();
}

// ─── Inbox View ───────────────────────────────
async function renderInbox() {
    const main = document.getElementById('main-content');
    main.innerHTML = `
        <div class="inbox-header">
            <h1 class="section-title"><span class="material-symbols-rounded" style="font-size:28px;vertical-align:middle;margin-right:8px">inbox</span>すべてのメール</h1>
            <button class="btn btn-success btn-sm" onclick="syncAllAccounts()">
                <span class="material-symbols-rounded" style="font-size:16px">sync</span> 全アカウント同期
            </button>
        </div>
        <div class="loading"><div class="spinner"></div></div>
    `;
    try {
        const data = await api('GET', '/api/messages?limit=200');
        renderMessageList(data.messages || []);
    } catch {
        main.innerHTML = `<div class="empty-state"><div class="empty-icon"><span class="material-symbols-rounded" style="font-size:40px">warning</span></div><div class="empty-text">読み込みエラー</div></div>`;
    }
}

function renderMessageList(messages) {
    const main = document.getElementById('main-content');
    if (!messages.length) {
        main.innerHTML = `
            <div class="inbox-header">
                <h1 class="section-title"><span class="material-symbols-rounded" style="font-size:28px;vertical-align:middle;margin-right:8px">inbox</span>すべてのメール</h1>
                <button class="btn btn-success btn-sm" onclick="syncAllAccounts()">
                    <span class="material-symbols-rounded" style="font-size:16px">sync</span> 全アカウント同期
                </button>
            </div>
            <div class="empty-state">
                <div class="empty-icon"><span class="material-symbols-rounded" style="font-size:56px">mail_outline</span></div>
                <div class="empty-text">メールがありません</div>
                <div class="empty-hint">同期ボタンを押して最新メールを取得してください</div>
            </div>
        `;
        return;
    }
    let html = `
        <div class="inbox-header">
            <h1 class="section-title"><span class="material-symbols-rounded" style="font-size:28px;vertical-align:middle;margin-right:8px">inbox</span>すべてのメール</h1>
            <button class="btn btn-success btn-sm" onclick="syncAllAccounts()"><span class="material-symbols-rounded" style="font-size:16px">sync</span> 全アカウント同期</button>
        </div>
        <div class="message-list">
    `;
    for (const m of messages) {
        const color = avatarColor(m.account_label || m.from_addr || '?');
        const isUnread = !m.flags.includes('\\Seen');
        html += `
            <div class="message-item ${isUnread ? 'unread' : ''}" onclick="viewMessage(${m.id})">
                <div class="message-avatar" style="background:${color}">
                    ${escapeHtml(initials(m.from_addr))}
                </div>
                <div class="message-body">
                    <div class="message-top-row">
                        ${m.account_label ? `<span class="message-account-tag" style="background:${color}22;color:${color}">${escapeHtml(m.account_label)}</span>` : ''}
                        <span class="message-subject">${escapeHtml(m.subject || '(件名なし)')}</span>
                    </div>
                    <div class="message-from">${escapeHtml(m.from_addr)}</div>
                </div>
                <span class="message-date">${formatDate(m.date)}</span>
                ${isUnread ? '<div class="unread-dot"></div>' : ''}
            </div>
        `;
    }
    html += '</div>';
    main.innerHTML = html;
}

// ─── Message Detail ───────────────────────────
async function viewMessage(id, push = true) {
    // Update URL via History API
    if (push) {
        history.pushState({ view: 'message', id }, '', `/message/${id}`);
    }
    updateNavActive(null);

    const main = document.getElementById('main-content');
    main.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
    try {
        const msg = await api('GET', `/api/messages/${id}`);
        const color = avatarColor(msg.account_label || msg.from_addr || '?');
        let html = `
            <div class="message-detail">
                <button class="btn btn-sm back-btn" onclick="switchView('inbox')"><span class="material-symbols-rounded" style="font-size:16px">arrow_back</span> 戻る</button>
                <div class="detail-header">
                    <div class="detail-subject">${escapeHtml(msg.subject || '(件名なし)')}</div>
                    ${msg.account_label ? `<div style="margin-bottom:12px"><span class="message-account-tag" style="background:${color}22;color:${color}">${escapeHtml(msg.account_label)}</span></div>` : ''}
                    <div class="detail-meta">
                        <div class="message-avatar" style="background:${color};width:48px;height:48px;font-size:20px">
                            ${escapeHtml(initials(msg.from_addr))}
                        </div>
                        <div class="detail-meta-row">
                            <div><span class="detail-label">From:</span>${escapeHtml(msg.from_addr || '')}</div>
                            <div><span class="detail-label">To:</span>${escapeHtml(msg.to_addr || '')}</div>
                            ${msg.cc_addr ? `<div><span class="detail-label">Cc:</span>${escapeHtml(msg.cc_addr)}</div>` : ''}
                            <div><span class="detail-label">日付:</span>${escapeHtml(msg.date || '')}</div>
                        </div>
                    </div>
                </div>
                <div class="detail-body">${escapeHtml(msg.body_text || '(本文なし)')}</div>
            </div>
        `;
        main.innerHTML = html;
    } catch {
        showToast('メッセージの取得に失敗しました', 'error');
        navigateTo('inbox');
    }
}

// ─── Accounts View ────────────────────────────
async function renderAccounts() {
    const main = document.getElementById('main-content');
    main.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
            <h1 class="section-title">👤 アカウント</h1>
            <button class="btn btn-primary" onclick="showAddAccount()"><span class="material-symbols-rounded" style="font-size:16px">add</span> 追加</button>
        </div>
        <div class="loading"><div class="spinner"></div></div>
    `;
    try {
        accounts = await api('GET', '/api/accounts');
        renderAccountsList(accounts);
    } catch {
        main.innerHTML = `<div class="empty-state"><div class="empty-icon"><span class="material-symbols-rounded" style="font-size:40px">warning</span></div><div class="empty-text">読み込みエラー</div></div>`;
    }
}

function renderAccountsList(accs) {
    const main = document.getElementById('main-content');
    if (!accs.length) {
        main.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
                <h1 class="section-title">👤 アカウント</h1>
                <button class="btn btn-primary" onclick="showAddAccount()"><span class="material-symbols-rounded" style="font-size:16px">add</span> 追加</button>
            </div>
            <div class="empty-state">
                <div class="empty-icon"><span class="material-symbols-rounded" style="font-size:56px">mail_off</span></div>
                <div class="empty-text">アカウントが登録されていません</div>
                <div class="empty-hint">「追加」ボタンからメールアカウントを登録してください</div>
            </div>
        `;
        return;
    }
    let html = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
            <h1 class="section-title">👤 アカウント</h1>
            <button class="btn btn-primary" onclick="showAddAccount()"><span class="material-symbols-rounded" style="font-size:16px">add</span> 追加</button>
        </div>
    `;
    for (const a of accs) {
        const color = avatarColor(a.label || a.email_address);
        html += `
            <div class="entity-card">
                <div class="entity-info">
                    <div class="entity-title">
                        <span class="message-avatar" style="background:${color};width:36px;height:36px;font-size:14px;display:inline-flex;vertical-align:middle;margin-right:10px">${escapeHtml(a.label?.[0]?.toUpperCase() || '?')}</span>
                        ${escapeHtml(a.label)}
                    </div>
                    <div class="entity-subtitle">${escapeHtml(a.email_address)}</div>
                    <div class="entity-meta">
                        <span><span class="material-symbols-rounded" style="font-size:14px;vertical-align:middle">imap</span> IMAP: ${escapeHtml(a.imap_host || '')}:${a.imap_port || 993}</span>
                        <span><span class="material-symbols-rounded" style="font-size:14px;vertical-align:middle">smtp</span> SMTP: ${escapeHtml(a.smtp_host || '')}:${a.smtp_port || 587}</span>
                        <span><span class="material-symbols-rounded" style="font-size:14px;vertical-align:middle">schedule</span> 同期: ${a.last_sync ? formatDate(a.last_sync) : '未同期'}</span>
                    </div>
                </div>
                <div class="entity-actions">
                    <button class="btn btn-success btn-sm" onclick="syncAccount(${a.id}, this)"><span class="material-symbols-rounded" style="font-size:16px">sync</span> 同期</button>
                    <button class="btn btn-sm" onclick="deleteAccount(${a.id}, '${escapeHtml(a.email_address)}')"><span class="material-symbols-rounded" style="font-size:16px">delete</span> 削除</button>
                </div>
            </div>
        `;
    }
    main.innerHTML = html;
}

// ─── Domains View ─────────────────────────────
async function renderDomains() {
    const main = document.getElementById('main-content');
    main.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
            <h1 class="section-title"><span class="material-symbols-rounded" style="font-size:28px;vertical-align:middle;margin-right:8px">language</span>ドメイン設定</h1>
            <button class="btn btn-primary" onclick="showAddDomain()"><span class="material-symbols-rounded" style="font-size:16px">add</span> 追加</button>
        </div>
        <div class="loading"><div class="spinner"></div></div>
    `;
    try {
        domains = await api('GET', '/api/domains');
        renderDomainsList(domains);
    } catch {
        main.innerHTML = `<div class="empty-state"><div class="empty-icon"><span class="material-symbols-rounded" style="font-size:40px">warning</span></div><div class="empty-text">読み込みエラー</div></div>`;
    }
}

function renderDomainsList(ds) {
    const main = document.getElementById('main-content');
    if (!ds.length) {
        main.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
                <h1 class="section-title"><span class="material-symbols-rounded" style="font-size:28px;vertical-align:middle;margin-right:8px">language</span>ドメイン設定</h1>
                <button class="btn btn-primary" onclick="showAddDomain()"><span class="material-symbols-rounded" style="font-size:16px">add</span> 追加</button>
            </div>
            <div class="empty-state">
                <div class="empty-icon"><span class="material-symbols-rounded" style="font-size:56px">language</span></div>
                <div class="empty-text">ドメイン設定がありません</div>
                <div class="empty-hint">ドメインを登録すると、アカウント追加時にIMAP/SMTP設定を自動入力できます</div>
            </div>
        `;
        return;
    }
    let html = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
            <h1 class="section-title"><span class="material-symbols-rounded" style="font-size:28px;vertical-align:middle;margin-right:8px">language</span>ドメイン設定</h1>
            <button class="btn btn-primary" onclick="showAddDomain()"><span class="material-symbols-rounded" style="font-size:16px">add</span> 追加</button>
        </div>
    `;
    for (const d of ds) {
        html += `
            <div class="entity-card">
                <div class="entity-info">
                    <div class="entity-title"><span class="badge badge-blue">@${escapeHtml(d.domain)}</span></div>
                    <div class="entity-meta">
                        <span><span class="material-symbols-rounded" style="font-size:14px;vertical-align:middle">imap</span> ${escapeHtml(d.imap_host)}:${d.imap_port}${d.imap_ssl ? ' (SSL)' : ''}</span>
                        <span><span class="material-symbols-rounded" style="font-size:14px;vertical-align:middle">smtp</span> ${escapeHtml(d.smtp_host)}:${d.smtp_port}${d.smtp_ssl ? ' (SSL)' : ''}</span>
                    </div>
                </div>
                <div class="entity-actions">
                    <button class="btn btn-sm" onclick="deleteDomain(${d.id})"><span class="material-symbols-rounded" style="font-size:16px">delete</span> 削除</button>
                </div>
            </div>
        `;
    }
    main.innerHTML = html;
}

// ─── Search View ──────────────────────────────
function renderSearch() {
    const main = document.getElementById('main-content');
    let accountOptions = '<option value="">全アカウント</option>';
    for (const a of accounts) {
        accountOptions += `<option value="${a.id}">${escapeHtml(a.label)}</option>`;
    }
    main.innerHTML = `
        <h1 class="section-title"><span class="material-symbols-rounded" style="font-size:28px;vertical-align:middle;margin-right:8px">search</span>検索</h1>
        <div class="search-bar" style="margin-bottom:16px">
            <input type="text" id="search-input" placeholder="件名・差出人・本文を検索..." onkeydown="if(event.key==='Enter')doSearch()">
        </div>
        <div style="margin-bottom:16px;display:flex;gap:12px;align-items:center">
            <select id="search-account" style="padding:8px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px">
                ${accountOptions}
            </select>
            <button class="btn btn-primary" onclick="doSearch()"><span class="material-symbols-rounded" style="font-size:28px;vertical-align:middle;margin-right:8px">search</span>検索</button>
        </div>
        <div id="search-results"></div>
    `;
}

async function doSearch() {
    const query = document.getElementById('search-input').value.trim();
    const accountId = document.getElementById('search-account').value;
    const resultsDiv = document.getElementById('search-results');
    if (!query) return;
    resultsDiv.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
    try {
        const url = accountId
            ? `/api/accounts/${accountId}/search?q=${encodeURIComponent(query)}&limit=50`
            : null;
        if (!url) {
            // search all accounts
            let allResults = [];
            for (const a of accounts) {
                try {
                    const res = await api('GET', `/api/accounts/${a.id}/search?q=${encodeURIComponent(query)}&limit=50`);
                    if (res.results) {
                        allResults.push(...res.results.map(r => ({...r, account_label: a.label, account_id: a.id})));
                    }
                } catch {}
            }
            allResults.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
            renderSearchResults(allResults);
        } else {
            const data = await api('GET', url);
            renderSearchResults(data.results || []);
        }
    } catch {
        resultsDiv.innerHTML = `<div class="empty-state"><div class="empty-text">検索エラー</div></div>`;
    }
}

function renderSearchResults(results) {
    const div = document.getElementById('search-results');
    if (!results.length) {
        div.innerHTML = `<div class="empty-state"><div class="empty-icon"><span class="material-symbols-rounded" style="font-size:56px">search_off</span></div><div class="empty-text">該当なし</div></div>`;
        return;
    }
    let html = '<div class="message-list">';
    for (const m of results) {
        const color = avatarColor(m.account_label || m.from_addr || '?');
        html += `
            <div class="message-item" onclick="viewMessage(${m.id})">
                <div class="message-avatar" style="background:${color}">${escapeHtml(initials(m.from_addr))}</div>
                <div class="message-body">
                    <div class="message-top-row">
                        ${m.account_label ? `<span class="message-account-tag" style="background:${color}22;color:${color}">${escapeHtml(m.account_label)}</span>` : ''}
                        <span class="message-subject">${escapeHtml(m.subject || '(件名なし)')}</span>
                    </div>
                    <div class="message-from">${escapeHtml(m.from_addr)}</div>
                </div>
                <span class="message-date">${formatDate(m.date)}</span>
            </div>
        `;
    }
    html += '</div>';
    div.innerHTML = html;
}

// ─── Sync Actions ─────────────────────────────
async function syncAccount(id, btn) {
    const orig = btn.innerHTML;
    btn.innerHTML = '⏳ 同期中...';
    btn.disabled = true;
    try {
        const res = await api('POST', `/api/accounts/${id}/sync`, {});
        if (res.success) {
            showToast(`${res.messages_synced}件同期${res.messages_deleted ? ' (' + res.messages_deleted + '件削除)' : ''}`, 'success');
        } else {
            showToast('同期失敗: ' + (res.error || '不明なエラー'), 'error');
        }
    } catch(e) {
        showToast('同期エラー: ' + e.message, 'error');
    }
    btn.innerHTML = orig;
    btn.disabled = false;
}

async function syncAllAccounts() {
    showToast('全アカウントを同期しています...', 'info');
    try {
        const accs = await api('GET', '/api/accounts');
        let totalSynced = 0, totalDeleted = 0;
        for (const a of accs) {
            const res = await api('POST', `/api/accounts/${a.id}/sync`, {});
            if (res.success) {
                totalSynced += res.messages_synced || 0;
                totalDeleted += res.messages_deleted || 0;
            }
        }
        showToast(`同期完了: ${totalSynced}件取得, ${totalDeleted}件削除`, 'success');
        renderInbox();
    } catch(e) {
        showToast('同期エラー: ' + e.message, 'error');
    }
}

function openModal(html, wide = false) {
    const modal = document.getElementById('modal');
    const content = document.getElementById('modal-content');
    content.className = wide ? 'modal-content modal-wide' : 'modal-content';
    content.innerHTML = html;
    modal.classList.add('show');
}

function closeModal() {
    document.getElementById('modal').classList.remove('show');
}

async function lookupDomain(emailOrDomain) {
    if (!emailOrDomain || !emailOrDomain.includes('@')) return;
    const domain = emailOrDomain.split('@')[1];
    const res = await api('POST', '/api/domains/lookup', { domain });
    const badge = document.getElementById('domain-auto-fill');
    if (res.found && res.config) {
        document.getElementById('acc-imap-host').value = res.config.imap_host;
        document.getElementById('acc-imap-port').value = res.config.imap_port;
        document.getElementById('acc-imap-ssl').checked = !!res.config.imap_ssl;
        document.getElementById('acc-smtp-host').value = res.config.smtp_host;
        document.getElementById('acc-smtp-port').value = res.config.smtp_port;
        document.getElementById('acc-smtp-ssl').checked = !!res.config.smtp_ssl;
        badge.style.display = 'block';
    } else {
        badge.style.display = 'none';
    }
}

async function addAccount() {
    const email = document.getElementById('acc-email').value.trim();
    const password = document.getElementById('acc-password').value;
    const label = document.getElementById('acc-label').value.trim() || email;
    if (!email || !password || !document.getElementById('acc-imap-host').value.trim()) {
        showToast('必須項目を入力してください', 'error');
        return;
    }
    const data = {
        label, email_address: email, password,
        username: document.getElementById('acc-username').value.trim() || null,
        imap_host: document.getElementById('acc-imap-host').value.trim(),
        imap_port: parseInt(document.getElementById('acc-imap-port').value) || 993,
        imap_ssl: document.getElementById('acc-imap-ssl').checked,
        smtp_host: document.getElementById('acc-smtp-host').value.trim(),
        smtp_port: parseInt(document.getElementById('acc-smtp-port').value) || 587,
        smtp_ssl: document.getElementById('acc-smtp-ssl').checked,
    };
    try {
        const res = await api('POST', '/api/accounts', data);
        if (res.success) {
            showToast('アカウントを追加しました', 'success');
            closeModal();
            renderAccounts();
        } else {
            showToast('エラー: ' + (res.error || '不明'), 'error');
        }
    } catch(e) {
        showToast('追加エラー: ' + e.message, 'error');
    }
}

async function deleteAccount(id, email) {
    if (!confirm(`アカウント「${email}」とキャッシュされたメールを削除しますか？`)) return;
    await api('DELETE', `/api/accounts/${id}`);
    showToast('アカウントを削除しました', 'success');
    renderAccounts();
}
